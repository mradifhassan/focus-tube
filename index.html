<!DOCTYPE html>
<html lang="en" class="bg-[#0f0f0f]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusTube - YouTube Client</title>
        <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <!-- Attribution: Video icons created by Freepik - Flaticon -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #0f0f0f;
        color: #f1f1f1;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }
      /* Custom YouTube Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f0f0f;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f3f;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #717171;
      }
      .yt-chip {
        background-color: #272727;
        color: #f1f1f1;
        transition: all 0.15s ease;
      }
      .yt-chip:hover {
        background-color: #3f3f3f;
      }
      .yt-chip.active {
        background-color: #f1f1f1;
        color: #0f0f0f;
        font-weight: 500;
      }
      .yt-sidebar-item {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: background-color 0.15s ease;
      }
      .yt-sidebar-item:hover {
        background-color: #272727;
      }
      .yt-sidebar-item.active {
        background-color: #272727;
        font-weight: 500;
      }
      .yt-tab {
        padding: 14px 24px;
        font-size: 14px;
        font-weight: 500;
        color: #aaa;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s ease;
      }
      .yt-tab:hover {
        color: #fff;
      }
      .yt-tab.active {
        color: #fff;
        border-bottom: 2px solid #fff;
      }
      /* Remove line clamps when expanded */
      .line-clamp-none {
        display: block;
        -webkit-line-clamp: unset;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
